{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubevirt-ui.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevirt-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubevirt-ui.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend
    - from:
        - podSelector:
            matchLabels:
              {{- include "kubevirt-ui.frontend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8000
          protocol: TCP
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow access to Kubernetes API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow direct access to metrics services (VictoriaMetrics / Prometheus)
    - to:
        - namespaceSelector: {}
      ports:
        - port: 8428
          protocol: TCP
        - port: 8429
          protocol: TCP
        - port: 9090
          protocol: TCP
    {{- if .Values.dex.enabled }}
    # Allow access to DEX
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubevirt-ui.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: dex
      ports:
        - port: 5556
          protocol: TCP
    {{- end }}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubevirt-ui.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevirt-ui.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubevirt-ui.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow traffic to backend
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubevirt-ui.backend.selectorLabels" . | nindent 14 }}
      ports:
        - port: 8000
          protocol: TCP
{{- end }}
