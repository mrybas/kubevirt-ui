{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubevirt-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevirt-ui.labels" . | nindent 4 }}
  annotations:
    # WebSocket support for VNC / serial console
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubevirt-ui.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          # Backend health
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubevirt-ui.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
          {{- if $.Values.dex.enabled }}
          # DEX OIDC provider (strip /dex prefix, Dex serves on /)
          - path: /dex
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubevirt-ui.fullname" $ }}-dex
                port:
                  number: {{ $.Values.dex.service.port }}
          {{- end }}
          # Everything else → frontend (SPA)
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "kubevirt-ui.fullname" $ }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
